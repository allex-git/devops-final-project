apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-app
  namespace: final-project
spec:
  ingressClassName: nginx
  rules:
    - host: app.allex-devops.devops11.test-danit.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: python-app-service
                port:
                  number: 80