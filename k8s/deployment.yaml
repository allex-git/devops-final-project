apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: final-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
        - name: python-app
          image: alexdevops05/final-project:latest
          imagePullPolicy: Always
          command: ["uvicorn"]
          args: ["main:app", "--host", "0.0.0.0", "--port", "8800"]
          ports:
            - containerPort: 8800

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8800
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8800
            initialDelaySeconds: 10
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"